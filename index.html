<!DOCTYPE html>
<html>
<head>
    <title>Baldwin-ProspectIQ</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2563eb; }
        .status { padding: 20px; background: #f0f9ff; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🎯 Baldwin-ProspectIQ</h1>
    <p>Lead Scoring & Enrichment Platform</p>
    <div class="status">
        <h2>Status</h2>
        <p>Backend: <span id="backend">Checking...</span></p>
        <p>Enrichment: <span id="enrichment">Checking...</span></p>
    </div>
    <script>
        fetch('/api/health')
            .then(r => r.json())
            .then(d => document.getElementById('backend').innerHTML = '✅ Connected')
            .catch(e => document.getElementById('backend').innerHTML = '❌ Not connected');
    </script>
</body>
</html>
