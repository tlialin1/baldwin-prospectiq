services:
  - type: web
    name: baldwin-backend
    runtime: python
    plan: free
    buildCommand: "echo 'Build complete'"
    startCommand: python backend/server.py
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: baldwin-enrichment
    runtime: python
    plan: free
    buildCommand: "echo 'Build complete'"
    startCommand: python enrichment-service/main.py
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: baldwin-frontend
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npx serve ."
    envVars:
      - key: PORT
        value: 10000