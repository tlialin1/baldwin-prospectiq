services:
  - type: web
    name: baldwin-backend
    runtime: python
    plan: free
    buildCommand: "echo 'Build complete'"
    startCommand: python backend/server.py
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: baldwin-enrichment
    runtime: python
    plan: free
    buildCommand: "echo 'Build complete'"
    startCommand: python enrichment-service/main.py
    envVars:
      - key: PORT
        value: 10000

  - type: static
    name: baldwin-frontend
    buildCommand: ""
    staticPublishPath: .

  - type: web
    name: baldwin-frontend2
    runtime: node
    plan: free
    buildCommand: "npm install && npm run build"
    startCommand: "npx serve -s build -l 10000"
    envVars:
      - key: PORT
        value: 10000
