services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - 3000
    env:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      path: /health
      port: 3000

  enrichment:
    build:
      context: .
      dockerfile: Dockerfile.enrichment
    ports:
      - 8000
    env:
      PORT: 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 80
