services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - 3000
    env:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      path: /health
      port: 3000
    depends_on:
      - postgres

  enrichment:
    build:
      context: .
      dockerfile: Dockerfile.enrichment
    ports:
      - 8000
    env:
      PORT: 8000
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    env:
      POSTGRES_DB: baldwin_prospectiq
      POSTGRES_USER: baldwin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - 80
